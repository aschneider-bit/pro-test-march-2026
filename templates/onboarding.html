{% extends "base.html" %}

{% block title %}Complete Your Profile - OFW{% endblock %}

{% block body %}
<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Complete your profile</h1>
        <p class="auth-subtitle">These fields are optional — you can skip and fill them in later.</p>

        <form method="POST" action="/onboarding">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="country_code">Country code</label>
                    <select id="country_code" name="country_code" class="form-select">
                        <option value="+1" selected>+1 (US)</option>
                        <option value="+44">+44 (UK)</option>
                        <option value="+61">+61 (AU)</option>
                        <option value="+33">+33 (FR)</option>
                        <option value="+49">+49 (DE)</option>
                        <option value="+81">+81 (JP)</option>
                        <option value="+86">+86 (CN)</option>
                        <option value="+91">+91 (IN)</option>
                        <option value="+52">+52 (MX)</option>
                        <option value="+55">+55 (BR)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="phone">Phone number</label>
                    <input type="tel" id="phone" name="phone" class="form-input" placeholder="(555) 123-4567">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="work_phone_ext">Work phone extension</label>
                <input type="text" id="work_phone_ext" name="work_phone_ext" class="form-input" placeholder="e.g. 1234">
            </div>

            <div class="form-group">
                <label class="form-label" for="security_question">Security question</label>
                <select id="security_question" name="security_question" class="form-select">
                    <option value="">Select a security question</option>
                    <option value="pet">What was the name of your first pet?</option>
                    <option value="school">What elementary school did you attend?</option>
                    <option value="city">In what city were you born?</option>
                    <option value="mother">What is your mother's maiden name?</option>
                    <option value="car">What was the make of your first car?</option>
                    <option value="street">What street did you grow up on?</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="security_answer">Security answer</label>
                <input type="text" id="security_answer" name="security_answer" class="form-input">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="security_code">4-digit security code</label>
                    <input type="text" id="security_code" name="security_code" class="form-input" maxlength="4" placeholder="0000">
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirm_code">Confirm code</label>
                    <input type="text" id="confirm_code" name="confirm_code" class="form-input" maxlength="4" placeholder="0000">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="referral_source">How did you hear about OFW?</label>
                <select id="referral_source" name="referral_source" class="form-select">
                    <option value="">Select an option</option>
                    <option value="colleague">Colleague or co-worker</option>
                    <option value="conference">Conference or event</option>
                    <option value="search">Online search</option>
                    <option value="social">Social media</option>
                    <option value="client">A client told me</option>
                    <option value="ad">Advertisement</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-actions" style="margin-top:24px;">
                <a href="/dashboard" class="btn btn-outline" style="flex:1;justify-content:center;">Skip for now</a>
                <button type="submit" class="btn btn-primary" style="flex:1;justify-content:center;">Save &amp; Continue</button>
            </div>
        </form>
    </div>
</div>
{% endblock body %}
