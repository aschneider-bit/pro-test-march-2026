{% extends "base.html" %}

{% block title %}Create Pro Account - OFW{% endblock %}

{% block body %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <svg viewBox="0 0 32 32" fill="none">
                <circle cx="16" cy="16" r="14" fill="#1976D2"/>
                <path d="M10 16l3-8h6l3 8-3 8h-6l-3-8z" fill="#fff" opacity="0.9"/>
                <circle cx="16" cy="16" r="3" fill="#1976D2"/>
            </svg>
            <span>OurFamilyWizard</span>
        </div>

        <h1 class="auth-title">Create your Pro account</h1>
        <p class="auth-subtitle">Get started with OFW for professionals</p>

        <form method="POST" action="/join/pro">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="first_name">First name</label>
                    <input type="text" id="first_name" name="first_name" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="last_name">Last name</label>
                    <input type="text" id="last_name" name="last_name" class="form-input" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" name="email" class="form-input" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="form-input" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="address">Address</label>
                <input type="text" id="address" name="address" class="form-input">
                <div class="form-hint">Start typing for suggestions</div>
            </div>

            <div class="form-group">
                <label class="form-label" for="account_type">Account type</label>
                <select id="account_type" name="account_type" class="form-select" required>
                    <option value="">Select account type</option>
                    <option value="attorney">Attorney</option>
                    <option value="mediator">Mediator</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-actions" style="margin-top:24px;">
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Create Account</button>
            </div>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</div>
{% endblock body %}
